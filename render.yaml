services:
  - type: web
    name: dadm
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/config
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: DATA_DIR
        value: /opt/render/project/src/data
    # ⚠ En plan free el filesystem es efímero: la base se reinicia en cada deploy/restart.
    # Para persistencia real, pasar a un plan pago y descomentar el disco:
    # disk:
    #   name: dadm-data
    #   mountPath: /var/data
    #   sizeGB: 1
    # y cambiar DATA_DIR a /var/data
